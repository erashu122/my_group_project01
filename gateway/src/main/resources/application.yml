server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:

        - id: activity-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/activities,/api/activities/**

        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ai/**,/api/recommendations/**,/api/report/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/fitness-app